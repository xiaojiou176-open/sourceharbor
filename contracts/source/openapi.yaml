components:
  schemas:
    HealthzResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Platform:
      type: string
      description: Source platform key. `youtube` and `bilibili` are strong-supported video lanes; other string values are allowed for generic RSSHub/RSS substrate usage.
      examples: [youtube, bilibili, rsshub, generic]

    SourceType:
      type: string
      description: Source identifier type. Known strong-supported values include `youtube_channel_id` and `bilibili_uid`; generic strings such as `rsshub_route` remain allowed without claiming per-route verification.
      examples: [youtube_channel_id, bilibili_uid, url, rsshub_route]

    SubscriptionSupportTier:
      type: string
      enum: [strong_supported, generic_supported]

    SubscriptionContentProfile:
      type: string
      enum: [video, article]

    JobStatus:
      type: string
      enum: [queued, running, succeeded, failed]

    Subscription:
      type: object
      required:
        [id, platform, source_type, source_value, support_tier, content_profile, rsshub_route, enabled, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        platform:
          $ref: '#/components/schemas/Platform'
        source_type:
          $ref: '#/components/schemas/SourceType'
        source_value:
          type: string
        source_name:
          type: string
        support_tier:
          $ref: '#/components/schemas/SubscriptionSupportTier'
        content_profile:
          $ref: '#/components/schemas/SubscriptionContentProfile'
        adapter_type:
          type: string
          enum: [rsshub_route, rss_generic]
        source_url:
          type: string
          nullable: true
        rsshub_route:
          type: string
        creator_display_name:
          type: string
          nullable: true
        creator_handle:
          type: string
          nullable: true
        source_homepage_url:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        avatar_label:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        source_universe_label:
          type: string
          nullable: true
        identity_status:
          type: string
          nullable: true
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        priority:
          type: integer
          minimum: 0
          maximum: 100
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SubscriptionUpsertRequest:
      type: object
      required: [platform, source_type, source_value]
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
        source_type:
          $ref: '#/components/schemas/SourceType'
        source_value:
          type: string
        adapter_type:
          type: string
          enum: [rsshub_route, rss_generic]
        source_url:
          type: string
          nullable: true
        rsshub_route:
          type: string
          nullable: true
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        priority:
          type: integer
          minimum: 0
          maximum: 100
        enabled:
          type: boolean

    SubscriptionTemplateSupportTier:
      type: object
      required: [id, label, description, content_profile, supports_video_pipeline, verification_status]
      properties:
        id:
          $ref: '#/components/schemas/SubscriptionSupportTier'
        label:
          type: string
        description:
          type: string
        content_profile:
          $ref: '#/components/schemas/SubscriptionContentProfile'
        supports_video_pipeline:
          type: boolean
        verification_status:
          type: string

    SubscriptionTemplate:
      type: object
      required:
        [id, label, description, support_tier, platform, source_type, adapter_type, content_profile, source_url_required, supports_video_pipeline]
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        support_tier:
          $ref: '#/components/schemas/SubscriptionSupportTier'
        platform:
          $ref: '#/components/schemas/Platform'
        source_type:
          $ref: '#/components/schemas/SourceType'
        adapter_type:
          type: string
          enum: [rsshub_route, rss_generic]
        content_profile:
          $ref: '#/components/schemas/SubscriptionContentProfile'
        category:
          type: string
          nullable: true
        source_value_placeholder:
          type: string
          nullable: true
        source_url_placeholder:
          type: string
          nullable: true
        rsshub_route_hint:
          type: string
          nullable: true
        source_url_required:
          type: boolean
        supports_video_pipeline:
          type: boolean
        fill_now:
          type: string
          nullable: true
        proof_boundary:
          type: string
          nullable: true
        evidence_note:
          type: string
          nullable: true

    SubscriptionTemplateCatalogResponse:
      type: object
      required: [support_tiers, templates]
      properties:
        support_tiers:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionTemplateSupportTier'
        templates:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionTemplate'

    SubscriptionUpsertResponse:
      type: object
      required: [subscription, created]
      properties:
        subscription:
          $ref: '#/components/schemas/Subscription'
        created:
          type: boolean

    ManualSourceIntakeRequest:
      type: object
      required: [raw_input]
      properties:
        raw_input:
          type: string
        category:
          type: string
          enum: [tech, creator, macro, ops, misc]
          default: misc
        tags:
          type: array
          items:
            type: string
        priority:
          type: integer
          minimum: 0
          maximum: 100
          default: 50
        enabled:
          type: boolean
          default: true

    ManualSourceIntakeResult:
      type: object
      required:
        [line_number, raw_input, target_kind, recommended_action, status, message]
      properties:
        line_number:
          type: integer
        raw_input:
          type: string
        target_kind:
          type: string
          enum: [subscription_source, manual_source_item, unsupported]
        recommended_action:
          type: string
          enum: [save_subscription, add_to_today, unsupported]
        applied_action:
          type: string
          nullable: true
          enum: [save_subscription, add_to_today]
        status:
          type: string
          enum: [created, updated, queued, reused, rejected]
        platform:
          type: string
          nullable: true
        source_type:
          type: string
          nullable: true
        source_value:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
        rsshub_route:
          type: string
          nullable: true
        adapter_type:
          type: string
          nullable: true
        content_profile:
          type: string
          nullable: true
        support_tier:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        relation_kind:
          type: string
          nullable: true
        matched_subscription_id:
          type: string
          nullable: true
        matched_subscription_name:
          type: string
          nullable: true
        matched_by:
          type: string
          nullable: true
        match_confidence:
          type: string
          nullable: true
        source_universe_label:
          type: string
          nullable: true
        creator_display_name:
          type: string
          nullable: true
        creator_handle:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        avatar_label:
          type: string
          nullable: true
        published_document_id:
          type: string
          nullable: true
        published_document_title:
          type: string
          nullable: true
        published_document_publish_status:
          type: string
          nullable: true
        reader_route:
          type: string
          nullable: true
        message:
          type: string
        subscription_id:
          type: string
          nullable: true
        job_id:
          type: string
          nullable: true

    ManualSourceIntakeResponse:
      type: object
      required:
        [processed_count, created_subscriptions, updated_subscriptions, queued_manual_items, reused_manual_items, rejected_count, results]
      properties:
        processed_count:
          type: integer
        created_subscriptions:
          type: integer
        updated_subscriptions:
          type: integer
        queued_manual_items:
          type: integer
        reused_manual_items:
          type: integer
        rejected_count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/ManualSourceIntakeResult'

    Watchlist:
      type: object
      required:
