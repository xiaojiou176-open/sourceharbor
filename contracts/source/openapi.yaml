      properties:
        id:
          type: string
        name:
          type: string
        matcher_type:
          type: string
          enum: [topic_key, claim_kind, platform, source_match]
        matcher_value:
          type: string
        delivery_channel:
          type: string
          enum: [dashboard, email]
        enabled:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    WatchlistUpsertRequest:
