openapi: 3.1.0
info:
  title: SourceHarbor API
  version: 0.1.19
  description: API contract for subscriptions, ingest polling, jobs, videos and artifacts.
servers:
  - url: http://127.0.0.1:9000
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthzResponse'

  /api/v1/subscriptions:
    get:
      operationId: listSubscriptions
      parameters:
        - in: query
          name: platform
          schema:
            $ref: '#/components/schemas/Platform'
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: enabled_only
          schema:
            type: boolean
      responses:
        '200':
          description: Subscription list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
    post:
      operationId: upsertSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionUpsertRequest'
      responses:
        '200':
          description: Upsert result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionUpsertResponse'

  /api/v1/subscriptions/manual-intake:
    post:
      operationId: submitManualSourceIntake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualSourceIntakeRequest'
      responses:
        '200':
          description: Mixed manual intake results for subscriptions and one-off source items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualSourceIntakeResponse'

  /api/v1/subscriptions/templates:
    get:
      operationId: listSubscriptionTemplates
      responses:
        '200':
          description: Supported subscription templates and support tiers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionTemplateCatalogResponse'

  /api/v1/subscriptions/{id}:
    delete:
      operationId: removeSubscription
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /api/v1/subscriptions/batch-update-category:
    post:
      operationId: batchUpdateSubscriptionCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Batch category update result
          content:
            application/json:
              schema:
                type: object

  /api/v1/watchlists:
    get:
      operationId: listWatchlists
      responses:
        '200':
          description: Watchlist list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Watchlist'
    post:
      operationId: upsertWatchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistUpsertRequest'
      responses:
        '200':
          description: Watchlist upsert result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Watchlist'

  /api/v1/watchlists/{watchlist_id}:
    delete:
      operationId: deleteWatchlist
      parameters:
        - in: path
          name: watchlist_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /api/v1/watchlists/{watchlist_id}/trend:
    get:
      operationId: getWatchlistTrend
      parameters:
        - in: path
          name: watchlist_id
          required: true
          schema:
            type: string
        - in: query
          name: limit_runs
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 3
        - in: query
          name: limit_cards
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 18
        - in: query
          name: limit_stories
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 4
        - in: query
          name: limit_evidence_per_story
          schema:
            type: integer
            minimum: 1
            maximum: 8
            default: 3
      responses:
        '200':
          description: Watchlist trend with timeline and merged story groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistTrendResponse'
        '404':
          description: Not found

  /api/v1/watchlists/{watchlist_id}/briefing:
    get:
      operationId: getWatchlistBriefing
      parameters:
        - in: path
          name: watchlist_id
          required: true
          schema:
            type: string
        - in: query
          name: limit_runs
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 4
        - in: query
          name: limit_cards
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 18
        - in: query
          name: limit_stories
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 4
        - in: query
          name: limit_evidence_per_story
          schema:
            type: integer
            minimum: 1
            maximum: 8
            default: 3
      responses:
        '200':
          description: Unified watchlist briefing with summary, differences, and evidence drill-down
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistBriefingResponse'
        '404':
          description: Not found

  /api/v1/watchlists/{watchlist_id}/briefing/page:
    get:
      operationId: getWatchlistBriefingPage
      parameters:
        - in: path
          name: watchlist_id
          required: true
          schema:
            type: string
        - in: query
          name: story_id
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: limit_runs
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 4
        - in: query
          name: limit_cards
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 18
        - in: query
          name: limit_stories
          schema:
            type: integer
            minimum: 1
            maximum: 12
            default: 4
        - in: query
          name: limit_evidence_per_story
          schema:
            type: integer
            minimum: 1
            maximum: 8
            default: 3
      responses:
        '200':
          description: Server-owned watchlist briefing page payload with selected story context and Ask handoff
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistBriefingPageResponse'
        '404':
          description: Not found

  /api/v1/ingest/poll:
    post:
      operationId: pollIngest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestPollRequest'
      responses:
        '202':
          description: Poll result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestPollResponse'

  /api/v1/ingest/consume:
    post:
      operationId: consumeIngest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumeBatchRequest'
      responses:
        '202':
          description: Consumption batch accepted or cooldown/no-pending result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumeBatchResponse'

  /api/v1/ingest/runs:
    get:
      operationId: listIngestRuns
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: platform
          schema:
            $ref: '#/components/schemas/Platform'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Recent ingest runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngestRunSummary'

  /api/v1/ingest/runs/{run_id}:
    get:
      operationId: getIngestRun
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ingest run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestRun'
        '404':
          description: Not found

  /api/v1/ingest/batches:
    get:
      operationId: listConsumptionBatches
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Recent consumption batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConsumptionBatchSummary'

  /api/v1/ingest/batches/{batch_id}:
    get:
      operationId: getConsumptionBatch
      parameters:
        - in: path
          name: batch_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Consumption batch detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumptionBatch'
        '404':
          description: Not found

  /api/v1/reader/batches/{batch_id}/judge:
    post:
      operationId: judgeConsumptionBatch
      parameters:
        - in: path
          name: batch_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Cluster verdict manifest generated for the consumption batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterVerdictManifest'
        '400':
          description: Invalid batch state
        '404':
          description: Not found

  /api/v1/reader/batches/{batch_id}/manifest:
    get:
      operationId: getClusterVerdictManifest
      parameters:
        - in: path
          name: batch_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cluster verdict manifest detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterVerdictManifest'
        '404':
          description: Not found

  /api/v1/reader/batches/{batch_id}/materialize:
    post:
      operationId: materializeConsumptionBatch
      parameters:
        - in: path
          name: batch_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterializeBatchRequest'
      responses:
        '201':
          description: Published reader documents generated for the consumption batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReaderBatchMaterializationResponse'
        '400':
          description: Invalid batch state
        '404':
          description: Not found

  /api/v1/reader/documents:
    get:
      operationId: listPublishedReaderDocuments
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: window_id
          schema:
            type: string
      responses:
        '200':
          description: Current published reader documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublishedReaderDocument'

  /api/v1/reader/documents/slug/{slug}:
    get:
      operationId: getPublishedReaderDocumentBySlug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Published reader document detail by slug
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishedReaderDocument'
        '404':
          description: Not found

  /api/v1/reader/documents/{document_id}:
    get:
      operationId: getPublishedReaderDocument
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Published reader document detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishedReaderDocument'
        '404':
          description: Not found

  /api/v1/reader/documents/{document_id}/repair:
    post:
      operationId: repairPublishedReaderDocument
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReaderDocumentRepairRequest'
      responses:
        '201':
          description: Published reader document repaired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishedReaderDocument'
        '400':
          description: Invalid repair request
        '404':
          description: Not found

  /api/v1/reader/navigation-brief:
    get:
      operationId: getReaderNavigationBrief
      parameters:
        - in: query
          name: window_id
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 8
      responses:
        '200':
          description: Navigation brief over current published reader documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigationBrief'

  /api/v1/jobs/{job_id}:
    get:
      operationId: getJob
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Not found

  /api/v1/jobs/{job_id}/compare:
    get:
      operationId: compareJob
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job compare detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCompareResponse'
        '404':
          description: Not found

  /api/v1/jobs/{job_id}/bundle:
    get:
      operationId: getJobEvidenceBundle
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job evidence bundle for drill-down and async reuse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEvidenceBundleResponse'
        '404':
          description: Not found

  /api/v1/knowledge/cards:
    get:
      operationId: listKnowledgeCards
      parameters:
        - in: query
          name: job_id
          schema:
            type: string
            format: uuid
        - in: query
          name: video_id
          schema:
            type: string
            format: uuid
        - in: query
          name: card_type
          schema:
            type: string
        - in: query
          name: topic_key
          schema:
            type: string
        - in: query
          name: claim_kind
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Knowledge cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeCard'

  /api/v1/jobs/{job_id}/knowledge-cards:
    get:
      operationId: getJobKnowledgeCards
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Knowledge cards derived from one job
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeCardResponse'
        '404':
          description: Not found

  /api/v1/retrieval/search:
    post:
      operationId: retrievalSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrievalSearchRequest'
      responses:
        '200':
          description: Retrieval search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalSearchResponse'

  /api/v1/retrieval/answer:
    post:
      operationId: retrievalAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskAnswerRequest'
      responses:
        '200':
          description: Briefing-aware answer contract
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskAnswerResponse'

  /api/v1/retrieval/answer/page:
    post:
      operationId: retrievalAnswerPage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskPageRequest'
      responses:
        '200':
          description: Server-owned Ask page payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskPageResponse'

  /api/v1/ops/inbox:
    get:
      operationId: getOpsInbox
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
        - in: query
          name: window_hours
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
      responses:
        '200':
          description: Operator inbox rollup for failures, gates, and next actions
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid ops inbox request
        '503':
          description: Ops inbox unavailable

  /api/v1/computer-use/run:
    post:
      operationId: runComputerUse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputerUseRunRequest'
      responses:
        '200':
          description: Computer use planning result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputerUseRunResponse'
        '400':
          description: Invalid request payload

  /api/v1/health/providers:
    get:
      operationId: getProviderHealth
      parameters:
        - in: query
          name: window_hours
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
      responses:
        '200':
          description: Provider health rollup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderHealthResponse'

  /api/v1/videos:
    get:
      operationId: listVideos
      parameters:
        - in: query
          name: platform
          schema:
            $ref: '#/components/schemas/Platform'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/JobStatus'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Video list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Video'

  /api/v1/videos/process:
    post:
      operationId: processVideo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoProcessRequest'
      responses:
        '202':
          description: Process job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoProcessResponse'
        '503':
          description: Temporal unavailable

  /api/v1/artifacts/markdown:
    get:
      operationId: getArtifactMarkdown
      parameters:
        - in: query
          name: job_id
          schema:
            type: string
            format: uuid
        - in: query
          name: video_url
          schema:
            type: string
            minLength: 1
        - in: query
          name: include_meta
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Markdown artifact text (plain text by default, JSON when include_meta=true)
          content:
            text/markdown:
              schema:
                type: string
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactMarkdownWithMeta'
        '400':
          description: Missing query parameters
        '404':
          description: Artifact not found

  /api/v1/artifacts/assets:
    get:
      operationId: getArtifactAsset
      parameters:
        - in: query
          name: job_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Artifact asset binary payload
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Artifact asset not found

  /api/v1/workflows/run:
    post:
      operationId: runWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowRunRequest'
      responses:
        '200':
          description: Workflow run accepted/completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResponse'
        '502':
          description: Workflow execution failed
        '503':
          description: Temporal unavailable or workflow start failed

  /api/v1/notifications/config:
    get:
      operationId: getNotificationConfig
      responses:
        '200':
          description: Notification config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationConfig'
    put:
      operationId: updateNotificationConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationConfigUpdateRequest'
      responses:
        '200':
          description: Updated notification config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationConfig'

  /api/v1/notifications/test:
    post:
      operationId: sendNotificationTest
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationTestRequest'
      responses:
        '200':
          description: Test notification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSendResponse'
        '400':
          description: Bad request
        '503':
          description: Notification provider unavailable

  /api/v1/reports/daily/send:
    post:
      operationId: sendDailyReport
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyReportSendRequest'
      responses:
        '200':
          description: Daily report notification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyReportSendResponse'
        '400':
          description: Bad request
        '503':
          description: Notification provider unavailable

  /api/v1/notifications/category/send:
    post:
      operationId: sendCategoryNotification
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Category notification result
          content:
            application/json:
              schema:
                type: object

  /api/v1/feed/digests:
    get:
      operationId: getDigestFeed
      parameters:
        - in: query
          name: source
          schema:
            $ref: '#/components/schemas/Platform'
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: feedback
          schema:
            type: string
            enum: [saved, useful, noisy, dismissed, archived]
        - in: query
          name: sort
          schema:
            type: string
            enum: [recent, curated]
        - in: query
          name: sub
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: since
          schema:
            type: string
      responses:
        '200':
          description: Digest feed result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigestFeedResponse'

  /api/v1/feed/feedback:
    get:
      operationId: getFeedFeedback
      parameters:
        - in: query
          name: job_id
          required: true
