<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">SourceHarbor first-look hero</title>
  <desc id="heroDesc">A reader-first product preview showing one finished reading sample, proof nearby, and builder tools later.</desc>
  <rect width="1600" height="920" rx="40" fill="#F7F1E8"/>
  <rect x="32" y="32" width="1536" height="856" rx="32" fill="#103734"/>
  <circle cx="1406" cy="160" r="190" fill="#F4B65D" fill-opacity="0.20"/>
  <circle cx="230" cy="756" r="248" fill="#2D8A76" fill-opacity="0.16"/>

  <rect x="92" y="96" width="210" height="40" rx="20" fill="#1A5C52"/>
  <text x="126" y="122" fill="#EAF6F1" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">SourceHarbor</text>

  <text x="104" y="214" fill="#FFF7EE" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">Start with one</text>
  <text x="104" y="288" fill="#FFF7EE" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">finished reading</text>
  <text x="104" y="362" fill="#FFF7EE" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700">surface</text>

  <text x="104" y="448" fill="#D2E7E0" font-family="Arial, Helvetica, sans-serif" font-size="28">See one story, one excerpt, and one proof trail</text>
  <text x="104" y="488" fill="#D2E7E0" font-family="Arial, Helvetica, sans-serif" font-size="28">before filters, settings, or builder rails ask for attention.</text>

  <rect x="104" y="546" width="246" height="56" rx="28" fill="#F4B65D"/>
  <text x="142" y="582" fill="#0E2D2B" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700">See it fast</text>
  <rect x="370" y="546" width="178" height="56" rx="28" fill="#163B37" stroke="#3A8E7A"/>
  <text x="408" y="582" fill="#EAF5F1" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Proof nearby</text>

  <rect x="738" y="92" width="760" height="704" rx="34" fill="#FFF9F2"/>
  <rect x="778" y="130" width="208" height="38" rx="19" fill="#E6F2EE"/>
  <text x="810" y="155" fill="#1A514A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Reading specimen</text>

  <rect x="778" y="198" width="680" height="320" rx="28" fill="#FFFFFF"/>
  <text x="824" y="246" fill="#6D7B78" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="3">FINISHED READER</text>
  <text x="824" y="320" fill="#153632" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Bilibili history milestone:</text>
  <text x="824" y="374" fill="#153632" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">the earliest surviving AV2.</text>
  <text x="824" y="430" fill="#536865" font-family="Arial, Helvetica, sans-serif" font-size="23">One note worth continuing, one short excerpt,</text>
  <text x="824" y="464" fill="#536865" font-family="Arial, Helvetica, sans-serif" font-size="23">and proof that stays nearby instead of</text>
  <text x="824" y="498" fill="#536865" font-family="Arial, Helvetica, sans-serif" font-size="23">taking over the page.</text>

  <rect x="824" y="542" width="160" height="38" rx="19" fill="#113833"/>
  <text x="860" y="567" fill="#EAF6F1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Finished reader</text>
  <rect x="1000" y="542" width="156" height="38" rx="19" fill="#E6F2EE"/>
  <text x="1033" y="567" fill="#1A514A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Readable title</text>
  <rect x="1172" y="542" width="206" height="38" rx="19" fill="#F4E7CC"/>
  <text x="1203" y="567" fill="#7A5A17" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Proof one click away</text>

  <rect x="778" y="618" width="680" height="96" rx="24" fill="#F2EBDD"/>
  <text x="824" y="662" fill="#5E706D" font-family="Arial, Helvetica, sans-serif" font-size="20">Open the timeline, search, or builder lane</text>
  <text x="824" y="692" fill="#5E706D" font-family="Arial, Helvetica, sans-serif" font-size="20">only after the story earns a second read.</text>
</svg>
