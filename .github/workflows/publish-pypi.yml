name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Package version that must match pyproject.toml before publish.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.workflow }}-${{ inputs.expected_version || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: external-pypi-publish
    permissions:
      contents: read
      id-token: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          clean: true
          persist-credentials: false

      - name: Install hosted runner prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Enforce runner disk budget
        run: |
          bash scripts/governance/runner_workspace_maintenance.sh --workspace "$GITHUB_WORKSPACE" --include-runner-diag 1
          python3 scripts/governance/check_runner_baseline.py --profile ci-heavy --workspace "$GITHUB_WORKSPACE"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Fail closed unless running from current main
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "publish-pypi must run from current main only; got ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Verify expected version and MCP ownership marker
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          python3 - <<'PY'
          import pathlib
          import tomllib

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          expected_version = pathlib.os.environ["EXPECTED_VERSION"]
          if version != expected_version:
              raise SystemExit(
                  f"pyproject version {version!r} does not match expected_version {expected_version!r}"
              )
          marker = "mcp-name: io.github.xiaojiou176-open/sourceharbor-mcp"
          if marker not in pathlib.Path("README.md").read_text(encoding="utf-8"):
              raise SystemExit("README.md must keep the MCP ownership marker before PyPI publish")
          print(f"verified expected version {expected_version}")
          PY

      - name: Build distributions
        run: |
          rm -rf dist build
          uv build

      - name: Write PyPI publish metadata
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          dist_dir = Path("dist")
          files = sorted(path.name for path in dist_dir.iterdir() if path.is_file())
          metadata = {
              "project": "sourceharbor",
              "expected_version": os.environ["EXPECTED_VERSION"],
              "dist_files": files,
              "workflow": "publish-pypi.yml",
              "environment": "external-pypi-publish",
          }
          output = Path(".runtime-cache/reports/publish-pypi/metadata.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(metadata, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload PyPI publish artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pypi-publish-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          path: |
            dist/*
            .runtime-cache/reports/publish-pypi/metadata.json

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

      - name: Summarize PyPI publish result
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          {
            echo "### PyPI publish result"
            echo "- project: \`sourceharbor\`"
            echo "- expected version: \`${EXPECTED_VERSION}\`"
            echo "- workflow: \`.github/workflows/publish-pypi.yml\`"
            echo "- trusted publisher / environment must already be configured on PyPI"
          } >> "$GITHUB_STEP_SUMMARY"
